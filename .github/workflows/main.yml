name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Asegúrate de que este nombre sea el que quieres en GitHub Packages
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  # 1. ANÁLISIS DE CALIDAD
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Usamos "." para que analice la raíz y no falle por carpeta inexistente
          args: >
            -Dsonar.projectKey=zunigx-actividad-sonarqube
            -Dsonar.sources=.

  # 2. PRUEBAS DE RENDIMIENTO
  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          # Asegúrate de que este archivo esté en la raíz de tu repo
          filename: script_k6.js 

  # 3. CONSTRUCCIÓN DE IMAGEN DOCKER
  build-and-push:
    name: Build Docker Image
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # Cambia esto a "./app-node" si tu Dockerfile está dentro de esa carpeta
          context: . 
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 4. DESPLIEGUE EN TU VM (SERVER-PROD-ZUNIGA)
  deploy:
    name: Despliegue en Servidor
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Entramos a la carpeta del proyecto en tu VM
            cd ~/proyecto-observabilidad
            
            # Login para poder bajar la imagen privada
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Bajamos la versión que el pipeline acaba de subir
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Reiniciamos solo el contenedor de la app
            sudo docker compose up -d
            
            # Limpieza de imágenes huérfanas
            sudo docker image prune -f
