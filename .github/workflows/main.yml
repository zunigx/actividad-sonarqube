name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zunigx/app-node-observabilidad

jobs:
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=zunigx-actividad-sonarqube
            -Dsonar.sources=app-node

  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance.js

  build-and-push:
    name: Build Docker Image
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app-node
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # Nuevo Job para el Despliegue Blue-Green
  deploy-blue-green:
    name: Despliegue Blue-Green en Nginx
    needs: build-and-push # Asegura que la imagen se construya antes de desplegar
    runs-on: ubuntu-latest
    steps:
      - name: Preparar script de Blue-Green en Servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST_NGINX }} # Deberías usar la IP/Host de nginx-zuniga
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # --- Configuración Blue-Green ---
            STATE_FILE="/etc/nginx/current_deploy.env"
            TEMPLATE_PATH="/etc/nginx/templates/nginx.conf.template"
            CONFIG_PATH="/etc/nginx/conf.d/default.conf"
            # IP interna de nginx-zuniga. Ajusta si es diferente.
            NGINX_INTERNAL_IP="10.0.1.2" 

            # --- Funciones ---
            get_current_color() {
                if [ -f "\$STATE_FILE" ]; then
                    source "\$STATE_FILE"
                    echo "\$CURRENT_COLOR"
                else
                    echo "Blue" # Valor por defecto si el archivo no existe
                fi
            }

            get_next_color() {
                local current_color="\$1"
                if [ "\$current_color" == "Blue" ]; then
                    echo "Green"
                else
                    echo "Blue"
                fi
            }

            # --- Lógica de Despliegue del Pipeline ---
            echo "--- Iniciando Despliegue Blue-Green en Nginx ---"

            CURRENT_COLOR=$(get_current_color)
            echo "Color actualmente productivo: \$CURRENT_COLOR"

            DEPLOY_COLOR=$(get_next_color "\$CURRENT_COLOR")
            echo "Próximo color a activar: \$DEPLOY_COLOR"

            # 3. Definir las variables para el nuevo despliegue
            if [ "\$DEPLOY_COLOR" == "Blue" ]; then
                export APP_TARGET_IP="\$NGINX_INTERNAL_IP"
                export APP_TARGET_PORT="8080"
                export DEPLOYMENT_COLOR="Blue"
            elif [ "\$DEPLOY_COLOR" == "Green" ]; then
                export APP_TARGET_IP="\$NGINX_INTERNAL_IP"
                export APP_TARGET_PORT="8081"
                export DEPLOYMENT_COLOR="Green"
            fi

            echo "Configurando Nginx para \$DEPLOY_COLOR (IP: \$APP_TARGET_IP, Puerto: \$APP_TARGET_PORT)"

            # 4. Sustitución Automática con envsubst
            sudo bash -c "
                export APP_TARGET_IP='${APP_TARGET_IP}';
                export APP_TARGET_PORT='${APP_TARGET_PORT}';
                export DEPLOYMENT_COLOR='${DEPLOYMENT_COLOR}';
                envsubst '\$APP_TARGET_IP \$APP_TARGET_PORT \$DEPLOYMENT_COLOR' < '$TEMPLATE_PATH' > '$CONFIG_PATH'
            "

            # 5. Validación y Recarga de Nginx
            echo "Validando la sintaxis de Nginx..."
            sudo nginx -t

            if [ \$? -eq 0 ]; then
                echo "Sintaxis de Nginx correcta. Recargando el servicio..."
                sudo systemctl reload nginx
                echo "Nginx recargado con éxito. El tráfico ahora apunta a \$DEPLOY_COLOR."

                # 6. Actualizar el archivo de estado persistente
                echo "CURRENT_COLOR=\$DEPLOY_COLOR" | sudo tee "\$STATE_FILE" > /dev/null
                echo "Estado actualizado a: \$DEPLOY_COLOR"
            else
                echo "Error CRÍTICO de sintaxis en la configuración de Nginx. El pipeline ha fallado."
                exit 1
            fi

            echo "--- Despliegue Blue-Green Completado ---"
